services:
  db:
    image: postgis/postgis:16-3.4
    container_name: daypoo-postgis
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: daypoo
      POSTGRES_USER: daypoo
      POSTGRES_PASSWORD: daypoo
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7.0-alpine
    container_name: daypoo-redis
    ports:
      - "6380:6379"

volumes:
  postgres_data:
