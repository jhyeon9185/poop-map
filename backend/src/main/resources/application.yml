server:
  port: 8080
  forward-headers-strategy: native

spring:
  application:
    name: daypoo-api

  datasource:
    url: jdbc:postgresql://${DB_HOST}:${DB_PORT}/${POSTGRES_DB}?reWriteBatchedInserts=true
    username: ${POSTGRES_USER}
    password: ${POSTGRES_PASSWORD}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 40
      minimum-idle: 10
      idle-timeout: 30000
      connection-timeout: 30000
      max-lifetime: 1800000

  flyway:
    enabled: true

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        format_sql: false
        dialect: org.hibernate.dialect.PostgreSQLDialect

  data:
    redis:
      host: ${REDIS_HOST}
      port: ${REDIS_PORT}

  # Authentication configuration
  security:
    jwt:
      secret-key: ${JWT_SECRET_KEY}
      access-token-validity-in-seconds: 3600
      refresh-token-validity-in-seconds: 1209600

    oauth2:
      client:
        registration:
          kakao:
            client-id: ${KAKAO_CLIENT_ID}
            client-secret: ${KAKAO_CLIENT_SECRET}
            client-authentication-method: client_secret_post
            authorization-grant-type: authorization_code
            redirect-uri: "${FRONTEND_URL}/login/oauth2/code/kakao"
            scope:
              - profile_nickname
            client-name: Kakao
          google:
            client-id: ${GOOGLE_CLIENT_ID}
            client-secret: ${GOOGLE_CLIENT_SECRET}
            redirect-uri: "${FRONTEND_URL}/login/oauth2/code/google"
            scope:
              - email
              - profile
        provider:
          kakao:
            authorization-uri: https://kauth.kakao.com/oauth/authorize
            token-uri: https://kauth.kakao.com/oauth/token
            user-info-uri: https://kapi.kakao.com/v2/user/me
            user-name-attribute: id
          google:
            user-name-attribute: sub

  mail:
    host: smtp.gmail.com
    port: 587
    username: ${MAIL_USERNAME}
    password: ${MAIL_PASSWORD}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
            required: true
          connectiontimeout: 5000
          timeout: 5000
          writetimeout: 5000

app:
  frontend:
    url: ${FRONTEND_URL:http://localhost:3000}
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:${FRONTEND_URL:http://localhost:5173}}

public-data:
  api-key: ${PUBLIC_DATA_API_KEY}
  url: ${PUBLIC_DATA_URL:https://apis.data.go.kr/1741000/public_restroom_info/info}

ai-service:
  url: ${AI_SERVICE_URL}

toss:
  secret-key: ${TOSS_SECRET_KEY}

logging:
  level:
    root: INFO
    com.daypoo: INFO

springdoc:
  swagger-ui:
    url: /openapi.yaml
    path: /docs
  api-docs:
    enabled: true # 스웨거 UI 구동을 위해 활성화 필요
