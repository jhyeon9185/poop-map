openapi: 3.0.1
info:
  title: DayPoo API
  description: 💩 DayPoo - 실시간 화장실 찾기 및 건강 리포트 AI 서비스 API
  version: v1.0.0
servers:
  - url: http://localhost:8080
    description: Local Server

paths:
  /api/v1/auth/signup:
    post:
      tags:
        - Authentication
      summary: 회원가입
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SignUpRequest"
      responses:
        "200":
          description: OK
  /api/v1/auth/login:
    post:
      tags:
        - Authentication
      summary: 로그인
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginRequest"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TokenResponse"

  /api/v1/toilets:
    get:
      tags:
        - Toilets
      summary: 주변 화장실 검색 (50m 반경 등)
      parameters:
        - name: latitude
          in: query
          required: true
          schema:
            type: number
            format: double
        - name: longitude
          in: query
          required: true
          schema:
            type: number
            format: double
        - name: radius
          in: query
          schema:
            type: number
            format: double
            default: 1000
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ToiletResponse"

  /api/v1/toilets/emergency:
    get:
      tags:
        - Toilets
      summary: 긴급 화장실 추천 (가까운 상위 3개)
      parameters:
        - name: latitude
          in: query
          required: true
          schema:
            type: number
            format: double
        - name: longitude
          in: query
          required: true
          schema:
            type: number
            format: double
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/EmergencyToiletResponse"

  /api/v1/records:
    post:
      tags:
        - Poo Records
      summary: 배변 기록 생성 (화장실 방문 인증)
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PooRecordCreateRequest"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PooRecordResponse"

  /api/v1/records/check-in:
    post:
      tags:
        - Poo Records
      summary: 화장실 도착 체크인 (최소 체류 시간 검증 시작)
      description: "화장실 반경(150m) 내에 있을 때 호출하며, 이 때부터 1분이 지나야 배변 기록 저장이 가능합니다."
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PooCheckInRequest"
      responses:
        "200":
          description: 체크인 성공
        "400":
          description: 위치 검증 실패 (반경 150m 밖)

  /api/v1/admin/toilets/sync:
    post:
      tags:
        - Admin
      summary: 공중화장실 데이터 동기화 (행안부 API 연동)
      description: "[ADMIN 전용] 행정안전부 API로부터 최신 화장실 데이터를 가져와 DB와 Redis를 동기화합니다."
      security:
        - BearerAuth: []
      parameters:
        - name: pageNo
          in: query
          schema:
            type: integer
            default: 1
        - name: numOfRows
          in: query
          schema:
            type: integer
            default: 100
      responses:
        "200":
          description: 성공
          content:
            text/plain:
              schema:
                type: string
        "403":
          description: 권한 없음 (ADMIN 전용)

  /api/v1/reports/{type}:
    get:
      tags:
        - Reports
      summary: AI 건강 리포트 조회
      security:
        - BearerAuth: []
      parameters:
        - name: type
          in: path
          required: true
          schema:
            type: string
            enum: [DAILY, WEEKLY, MONTHLY]
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthReportResponse"

  /api/v1/shop/items:
    get:
      tags:
        - Shop
      summary: 상점 아이템 목록 조회
      parameters:
        - name: type
          in: query
          schema:
            type: string
            enum: [AVATAR_SKIN, MARKER_SKIN]
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ItemResponse"

  /api/v1/shop/purchase:
    post:
      tags:
        - Shop
      summary: 아이템 구매
      security:
        - BearerAuth: []
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ShopPurchaseRequest"
      responses:
        "200":
          description: OK

  /api/v1/shop/inventory:
    get:
      tags:
        - Shop
      summary: 내 인벤토리 조회
      security:
        - BearerAuth: []
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/InventoryResponse"

  /api/v1/shop/inventory/{inventoryId}/toggle:
    post:
      tags:
        - Shop
      summary: 아이템 장착/해제 토글
      security:
        - BearerAuth: []
      parameters:
        - name: inventoryId
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        "200":
          description: OK

  /api/v1/shop/titles:
    get:
      tags:
        - Shop
      summary: 전체 칭호 목록 및 보유 여부 조회
      security:
        - BearerAuth: []
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/TitleResponse"

  /api/v1/shop/titles/{titleId}/equip:
    post:
      tags:
        - Shop
      summary: 칭호 장착
      security:
        - BearerAuth: []
      parameters:
        - name: titleId
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        "200":
          description: OK

  /api/v1/rankings/region:
    get:
      tags:
        - Rankings
      summary: 지역별 랭킹 조회
      security:
        - BearerAuth: []
      parameters:
        - name: regionName
          in: query
          required: true
          schema:
            type: string
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RankingResponse"

  /api/v1/notifications/subscribe:
    get:
      tags:
        - Notifications
      summary: 실시간 알림 구독 (SSE)
      security:
        - BearerAuth: []
      responses:
        "200":
          description: SSE Stream Establishment
          content:
            text/event-stream:
              schema:
                type: string

  /api/v1/notifications:
    get:
      tags:
        - Notifications
      summary: 내 알림 목록 조회
      security:
        - BearerAuth: []
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/NotificationResponse"

  /api/v1/notifications/{notificationId}/read:
    patch:
      tags:
        - Notifications
      summary: 알림 읽음 처리
      security:
        - BearerAuth: []
      parameters:
        - name: notificationId
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        "200":
          description: OK

  /api/v1/inquiries:
    post:
      tags:
        - Support
      summary: 1:1 문의 등록
      security:
        - BearerAuth: []
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/InquiryRequest"
      responses:
        "200":
          description: OK
    get:
      tags:
        - Support
      summary: 내 문의 내역 조회
      security:
        - BearerAuth: []
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/InquiryResponse"

  /api/v1/faqs:
    get:
      tags:
        - Support
      summary: FAQ 조회
      parameters:
        - name: category
          in: query
          schema:
            type: string
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/FaqResponse"

  /api/v1/admin/stats:
    get:
      tags:
        - Admin
      summary: 시스템 통계 조회
      security:
        - BearerAuth: []
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminStatsResponse"

  /api/v1/admin/inquiries/{inquiryId}/answer:
    post:
      tags:
        - Admin
      summary: 1:1 문의 답변 등록
      security:
        - BearerAuth: []
      parameters:
        - name: inquiryId
          in: path
          required: true
          schema:
            type: integer
            format: int64
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AdminInquiryAnswerRequest"
      responses:
        "200":
          description: OK

components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    SignUpRequest:
      type: object
      properties:
        username:
          type: string
        password:
          type: string
        nickname:
          type: string
    LoginRequest:
      type: object
      properties:
        username:
          type: string
        password:
          type: string
    TokenResponse:
      type: object
      properties:
        accessToken:
          type: string
        refreshToken:
          type: string
    ToiletResponse:
      type: object
      properties:
        id:
          type: integer
          format: int64
        name:
          type: string
        latitude:
          type: number
          format: double
        longitude:
          type: number
          format: double
        address:
          type: string
        openHours:
          type: string
        is24h:
          type: boolean
        distance:
          type: number
          format: double
    PooRecordCreateRequest:
      type: object
      properties:
        toiletId:
          type: integer
          format: int64
        bristolScale:
          type: integer
        color:
          type: string
        conditionTags:
          type: array
          items:
            type: string
        dietTags:
          type: array
          items:
            type: string
        latitude:
          type: number
          format: double
        longitude:
          type: number
          format: double
        imageBase64:
          type: string
    PooCheckInRequest:
      type: object
      required:
        - toiletId
        - latitude
        - longitude
      properties:
        toiletId:
          type: integer
          format: int64
        latitude:
          type: number
          format: double
        longitude:
          type: number
          format: double
    PooRecordResponse:
      type: object
      properties:
        id:
          type: integer
          format: int64
        userId:
          type: integer
          format: int64
        toiletId:
          type: integer
          format: int64
        toiletName:
          type: string
        bristolScale:
          type: integer
        color:
          type: string
        conditionTags:
          type: array
          items:
            type: string
        dietTags:
          type: array
          items:
            type: string
        earnedExp:
          type: integer
        earnedPoints:
          type: integer
        createdAt:
          type: string
          format: date-time
    HealthReportResponse:
      type: object
      properties:
        userId:
          type: integer
          format: int64
        nickname:
          type: string
        reportType:
          type: string
        analysisSummary:
          type: string
        score:
          type: integer
        aiRecommendation:
          type: string
        generatedAt:
          type: string
          format: date-time
    ItemResponse:
      type: object
      properties:
        id:
          type: integer
          format: int64
        name:
          type: string
        description:
          type: string
        type:
          type: string
        price:
          type: integer
          format: int64
        imageUrl:
          type: string
    RankingResponse:
      type: object
      properties:
        topRankers:
          type: array
          items:
            $ref: "#/components/schemas/UserRankResponse"
        myRank:
          $ref: "#/components/schemas/UserRankResponse"
    EmergencyToiletResponse:
      type: object
      properties:
        id:
          type: integer
          format: int64
        name:
          type: string
        distance:
          type: number
          format: double
        is24h:
          type: boolean
    NotificationResponse:
      type: object
      properties:
        id:
          type: integer
          format: int64
        message:
          type: string
        type:
          type: string
        read:
          type: boolean
        createdAt:
          type: string
          format: date-time
    InquiryRequest:
      type: object
      properties:
        title:
          type: string
        content:
          type: string
    InquiryResponse:
      type: object
      properties:
        id:
          type: integer
          format: int64
        title:
          type: string
        content:
          type: string
        answer:
          type: string
        status:
          type: string
        createdAt:
          type: string
          format: date-time
    FaqResponse:
      type: object
      properties:
        id:
          type: integer
          format: int64
        category:
          type: string
        question:
          type: string
        answer:
          type: string
    AdminStatsResponse:
      type: object
      properties:
        totalUsers:
          type: integer
        todayNewUsers:
          type: integer
        totalRecords:
          type: integer
        todayRecords:
          type: integer
    AdminInquiryAnswerRequest:
      type: object
      properties:
        answer:
          type: string
    InventoryResponse:
      type: object
      properties:
        id:
          type: integer
          format: int64
        itemId:
          type: integer
          format: int64
        itemName:
          type: string
        itemType:
          type: string
        isEquipped:
          type: boolean
    ShopPurchaseRequest:
      type: object
      properties:
        itemId:
          type: integer
          format: int64
    TitleResponse:
      type: object
      properties:
        id:
          type: integer
          format: int64
        name:
          type: string
        requirement:
          type: string
        isOwned:
          type: boolean
        isEquipped:
          type: boolean
