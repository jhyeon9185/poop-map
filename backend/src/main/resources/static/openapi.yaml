openapi: 3.0.1
info:
  title: DayPoo API
  description: 💩 DayPoo - 실시간 화장실 찾기 및 건강 리포트 AI 서비스 API
  version: v1.0.0
servers:
  - url: http://localhost:8080
    description: Local Server

paths:
  /api/v1/auth/signup:
    post:
      tags:
        - Authentication
      summary: 회원가입
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SignUpRequest"
      responses:
        "200":
          description: OK
  /api/v1/auth/login:
    post:
      tags:
        - Authentication
      summary: 로그인
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginRequest"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TokenResponse"

  /api/v1/toilets:
    get:
      tags:
        - Toilets
      summary: 주변 화장실 검색
      parameters:
        - name: latitude
          in: query
          required: true
          schema:
            type: number
            format: double
        - name: longitude
          in: query
          required: true
          schema:
            type: number
            format: double
        - name: radius
          in: query
          schema:
            type: integer
            default: 1000
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ToiletResponse"

  /api/v1/records:
    post:
      tags:
        - Poo Records
      summary: 배변 기록 생성 (화장실 방문 인증)
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PooRecordCreateRequest"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PooRecordResponse"

  /api/v1/reports/{type}:
    get:
      tags:
        - Reports
      summary: AI 건강 리포트 조회
      security:
        - BearerAuth: []
      parameters:
        - name: type
          in: path
          required: true
          schema:
            type: string
            enum: [DAILY, WEEKLY, MONTHLY]
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthReportResponse"

  /api/v1/shop/items:
    get:
      tags:
        - Shop
      summary: 상점 아이템 목록 조회
      parameters:
        - name: type
          in: query
          schema:
            type: string
            enum: [AVATAR_SKIN, MARKER_SKIN]
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ItemResponse"

  /api/v1/shop/purchase:
    post:
      tags:
        - Shop
      summary: 아이템 구매
      security:
        - BearerAuth: []
      parameters:
        - name: itemId
          in: query
          required: true
          schema:
            type: integer
            format: int64
      responses:
        "200":
          description: OK

  /api/v1/rankings/global:
    get:
      tags:
        - Rankings
      summary: 글로벌 랭킹 조회
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RankingResponse"

components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    SignUpRequest:
      type: object
      properties:
        username:
          type: string
        password:
          type: string
        nickname:
          type: string
    LoginRequest:
      type: object
      properties:
        username:
          type: string
        password:
          type: string
    TokenResponse:
      type: object
      properties:
        accessToken:
          type: string
        refreshToken:
          type: string
    ToiletResponse:
      type: object
      properties:
        id:
          type: integer
          format: int64
        name:
          type: string
        latitude:
          type: number
          format: double
        longitude:
          type: number
          format: double
        address:
          type: string
        openHours:
          type: string
        is24h:
          type: boolean
        distance:
          type: number
          format: double
    PooRecordCreateRequest:
      type: object
      properties:
        toiletId:
          type: integer
          format: int64
        bristolScale:
          type: integer
        color:
          type: string
        conditionTags:
          type: array
          items:
            type: string
        dietTags:
          type: array
          items:
            type: string
        latitude:
          type: number
          format: double
        longitude:
          type: number
          format: double
        imageBase64:
          type: string
    PooRecordResponse:
      type: object
      properties:
        id:
          type: integer
          format: int64
        userId:
          type: integer
          format: int64
        toiletId:
          type: integer
          format: int64
        toiletName:
          type: string
        bristolScale:
          type: integer
        color:
          type: string
        conditionTags:
          type: array
          items:
            type: string
        dietTags:
          type: array
          items:
            type: string
        earnedExp:
          type: integer
        earnedPoints:
          type: integer
        createdAt:
          type: string
          format: date-time
    HealthReportResponse:
      type: object
      properties:
        userId:
          type: integer
          format: int64
        nickname:
          type: string
        reportType:
          type: string
        analysisSummary:
          type: string
        score:
          type: integer
        aiRecommendation:
          type: string
        generatedAt:
          type: string
          format: date-time
    ItemResponse:
      type: object
      properties:
        id:
          type: integer
          format: int64
        name:
          type: string
        description:
          type: string
        type:
          type: string
        price:
          type: integer
          format: int64
        imageUrl:
          type: string
    RankingResponse:
      type: object
      properties:
        type:
          type: string
        entries:
          type: array
          items:
            $ref: "#/components/schemas/UserRankResponse"
    UserRankResponse:
      type: object
      properties:
        rank:
          type: integer
        nickname:
          type: string
        level:
          type: integer
        points:
          type: integer
        equippedTitle:
          type: string
